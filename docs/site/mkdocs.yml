site_name: maicoin
site_description: Python client for the MaiCoin MAX exchange — typed REST v3 and WebSocket clients.
site_url: https://narumiruna.github.io/maicoin/
repo_url: https://github.com/narumiruna/maicoin
repo_name: narumiruna/maicoin
edit_uri: edit/main/docs/site/content/

docs_dir: content
site_dir: build

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: amber
      accent: orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: amber
      accent: orange
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [../../src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            separate_signature: true
            signature_crossrefs: true
            merge_init_into_class: true
            show_if_no_docstring: true
            filters:
              - "!^_"

nav:
  - Home: index.md
  - Getting started:
      - Installation: install.md
      - Quick start: quickstart.md
  - Guides:
      - REST v3: rest.md
      - WebSocket: websocket.md
      - Live integration tests: live-tests.md
  - API reference:
      - maicoin.v3: reference/v3.md
      - maicoin.ws: reference/ws.md
  - Development: development.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/narumiruna/maicoin
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/maicoin/
