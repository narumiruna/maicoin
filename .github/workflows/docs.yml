name: Docs

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - docs/site/**
      - src/**
      - pyproject.toml
      - uv.lock
      - .github/workflows/docs.yml

permissions:
  contents: read
  pages: write
  id-token: write

env:
  MKDOCS_CONFIG: docs/site/mkdocs.yml
  PAGES_ARTIFACT_PATH: docs/site/build

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      - uses: actions/configure-pages@v6
      - name: Install docs dependencies
        run: uv sync --frozen --group docs
      - name: Build site
        run: uv run --group docs mkdocs build --strict -f "$MKDOCS_CONFIG"
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ${{ env.PAGES_ARTIFACT_PATH }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
